name: midi_keyboard
kind: midi

midi:
  max_force: 500.0
  aftertouch: true
  velocity_curve:
    points:
      - [0.0, 0.0]
      - [0.3, 0.4]
      - [1.0, 1.0]

# Single-row pseudo-piano: 13 keys spanning one octave (C3-C4).
# Each key is a narrow vertical strip across the full height.
# Polyphonic aftertouch is enabled so sustained pressure modulates.
regions:
  - name: C3
    rect: { x: 0.0, y: 0.0, w: 0.0769, h: 1.0 }
    action: { type: note, note: 48, channel: 0 }

